<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - College Finder AI</title>
    <style>
       *{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f172a;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(139,92,246,0.3),transparent 50%),radial-gradient(circle at 80% 80%,rgba(236,72,153,0.3),transparent 50%)}
.container{position:relative;z-index:1;width:100%;max-width:450px;padding:20px}
.card{background:rgba(30,41,59,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{font-size:48px;margin-bottom:12px}
.logo h1{font-size:28px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.form-group{margin-bottom:24px}
.form-group label{display:block;margin-bottom:8px;font-size:14px;font-weight:500;color:#cbd5e1}
.form-group input{width:100%;padding:14px 16px;background:rgba(15,23,42,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:white;font-size:15px;transition:all 0.3s}
.form-group input:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,0.2)}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:12px;color:white;font-weight:600;font-size:16px;cursor:pointer;transition:all 0.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(139,92,246,0.4)}
.link{text-align:center;margin-top:24px;color:#94a3b8;font-size:14px}
.link a{color:#8b5cf6;text-decoration:none;font-weight:600}

  </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">🎓</div>
                <h1>Create Account</h1>
            </div>
            <form method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Min 6 characters" required>
                </div>
                <button type="submit" class="btn">Create Account →</button>
            </form>
            <div class="link">
                Already have account? <a href="/login">Login</a>
            </div>
        </div>
    </div>
</body>
</html>
